<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DefendMap - Realtime Prototype</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f7f3f5; overflow: hidden; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        .app-header {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(219,144,180,0.2);
            border: 1px solid rgba(255,255,255,0.6);
            text-align: center; width: 80%; max-width: 340px;
        }
        .app-header h1 { margin: 0; font-size: 16px; color: #7b506f; font-weight: 700; }
        .gps-status { font-size: 11px; color: #8b5cf6; margin-top: 4px; font-weight: bold; }
        .report-trigger-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: linear-gradient(135deg, #e899bc 0%, #b185db 100%);
            color: white; border: none; padding: 16px 35px; border-radius: 50px;
            font-size: 16px; font-weight: bold;
            box-shadow: 0 8px 25px rgba(177,133,219,0.4);
            cursor: pointer; transition: all 0.3s ease; white-space: nowrap;
        }
        .report-trigger-btn:disabled { background: #d1d5db; color: #9ca3af; box-shadow: none; cursor: not-allowed; }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40,30,45,0.4); backdrop-filter: blur(4px);
            z-index: 2000; justify-content: center; align-items: flex-end;
        }
        .modal-sheet {
            background: white; width: 100%; max-width: 500px;
            border-radius: 30px 30px 0 0; padding: 25px 20px 40px 20px;
            box-sizing: border-box; transform: translateY(100%); transition: transform 0.3s ease;
        }
        .modal-sheet.open { transform: translateY(0); }
        .modal-title { font-size: 18px; font-weight: 700; color: #4a3b4e; text-align: center; margin-bottom: 5px; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .report-btn { border: none; padding: 18px 10px; border-radius: 18px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-alert1 { background-color: #ffeef2; color: #ff5e7e; }
        .btn-alert2 { background-color: #f3e8ff; color: #a855f7; }
        .btn-alert3 { background-color: #fffbeb; color: #d97706; }
        .btn-alert4 { background-color: #f0fdf4; color: #16a34a; }
        .close-modal-btn { grid-column: span 2; background: #f3f4f6; color: #9ca3af; margin-top: 10px; }
        .leaflet-control-attribution { background: rgba(255,255,255,0.7) !important; color: #4a3b4e !important; font-size: 10px !important; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>🛡️ リアルタイム防衛レーダー</h1>
        <div id="gpsStatus" class="gps-status">GPS信号を探索中...</div>
    </div>
    <div id="map"></div>
    <button class="report-trigger-btn" id="reportTrigger" onclick="openModal()" disabled>📍 位置情報取得中...</button>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-sheet" id="modalSheet" onclick="event.stopPropagation()">
            <div class="modal-title">状況を1タップで周囲に共有</div>
            <div class="button-grid">
                <button class="report-btn btn-alert1" onclick="submitReport('🚨 痴漢・盗撮注意','#ff5e7e')">🚫 痴漢・盗撮</button>
                <button class="report-btn btn-alert2" onclick="submitReport('👣 つきまとい警戒','#a855f7')">👀 つきまとい</button>
                <button class="report-btn btn-alert3" onclick="submitReport('⚠️ 不審な声かけ','#d97706')">👤 不審者・声かけ</button>
                <button class="report-btn btn-alert4" onclick="submitReport('🌸 安全に通過中','#16a34a')">✨ 帰宅中（生存）</button>
                <button class="report-btn close-modal-btn" onclick="closeModal(null,true)">閉じる</button>
            </div>
        </div>
    </div>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Firebase CDN（モジュールなし・compat版） -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // Firebase初期化
        const firebaseConfig = {
            apiKey: "AIzaSyCtsHjf9W-l0JyErYEQcMST2EZSJS1auiw",
            authDomain: "bouhan1837.firebaseapp.com",
            databaseURL: "https://bouhan1837-default-rtdb.firebaseio.com",
            projectId: "bouhan1837",
            storageBucket: "bouhan1837.firebasestorage.app",
            messagingSenderId: "994352637939",
            appId: "1:994352637939:web:f12a80057af2f57dfe1486"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const dbRef = db.ref('reports');

        let map, userMarker;
        let currentPos = { lat: null, lng: null };
        const markersMap = new Map();

        // 地図初期化
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([35.681236, 139.767125], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);
            startTracking();
            listenToFirebase();
        }

        // GPS追跡
        function startTracking() {
            if (!navigator.geolocation) {
                document.getElementById('gpsStatus').innerText = "GPS非対応ブラウザです";
                return;
            }
            navigator.geolocation.watchPosition(
                (position) => {
                    currentPos.lat = position.coords.latitude;
                    currentPos.lng = position.coords.longitude;
                    if (userMarker) {
                        userMarker.setLatLng([currentPos.lat, currentPos.lng]);
                    } else {
                        userMarker = L.circleMarker([currentPos.lat, currentPos.lng], {
                            radius: 8, fillColor: '#3b82f6', color: '#fff', weight: 3, fillOpacity: 1
                        }).addTo(map).bindPopup("あなたの現在地");
                        map.setView([currentPos.lat, currentPos.lng], 16);
                    }
                    document.getElementById('gpsStatus').innerText = "🟢 GPS接続中 (高精度)";
                    const btn = document.getElementById('reportTrigger');
                    btn.disabled = false;
                    btn.innerText = "⚠️ いまここを警告・報告";
                },
                (error) => {
                    document.getElementById('gpsStatus').innerText = "🔴 GPS取得エラー。設定を確認してください";
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        // Firebase読み込み
        function listenToFirebase() {
            dbRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                const now = Date.now();
                const dayInMs = 24 * 60 * 60 * 1000;
                Object.keys(data).forEach(key => {
                    const report = data[key];
                    if (now - report.timestamp > dayInMs) {
                        if (markersMap.has(key)) { map.removeLayer(markersMap.get(key)); markersMap.delete(key); }
                        return;
                    }
                    if (!markersMap.has(key)) {
                        const timeString = new Date(report.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
                        const marker = L.circleMarker([report.lat, report.lng], {
                            radius: 12, fillColor: report.color || '#ff5e7e', color: '#fff', weight: 2, fillOpacity: 0.8
                        }).addTo(map).bindPopup(`<b>${report.type}</b><br>⏱️ 発生時刻: ${timeString}`);
                        markersMap.set(key, marker);
                    }
                });
            });
        }

        // 報告送信
        window.submitReport = function(typeString, colorHex) {
            if (!currentPos.lat || !currentPos.lng) return;
            dbRef.push({
                type: typeString, color: colorHex,
                lat: currentPos.lat, lng: currentPos.lng,
                timestamp: Date.now()
            }).then(() => closeModal(null, true))
              .catch((e) => alert("送信失敗: " + e.message));
        };

        // モーダル
        const overlay = document.getElementById('modalOverlay');
        const sheet = document.getElementById('modalSheet');
        window.openModal = function() {
            overlay.style.display = 'flex';
            setTimeout(() => sheet.classList.add('open'), 10);
        };
        window.closeModal = function(event, force = false) {
            if (force || (event && event.target === overlay)) {
                sheet.classList.remove('open');
                setTimeout(() => overlay.style.display = 'none', 300);
            }
        };

        // 起動（moduleなしの通常scriptなのでDOMContentLoadedで確実に動く）
        document.addEventListener('DOMContentLoaded', initMap);
    </script>
</body>
</html>
